# Tunable parameters for the wiki build/retrieval pipeline.
# Loaded by scripts/wiki_lib/config.py::get_config(). All keys are required
# (the loader uses Pydantic with extra="forbid" + frozen=True, strict=True).

chunking:
  target_tokens: 500          # rough chunk size target (build_index.py)
  min_tokens: 80              # don't emit chunks shorter than this unless final
  max_tokens: 800             # hard upper bound
  overlap_tokens: 50          # carry-over between adjacent chunks
  words_per_token: 0.75       # heuristic, no tokenizer dependency

retrieval:
  bm25_k1: 1.5                # BM25 term-saturation; standard value
  bm25_b: 0.75                # BM25 length-normalization; standard value
  title_boost: 0.5            # chunks whose file title matches the query get this lift
  heading_boost: 0.3          # chunks whose surrounding heading matches the query get this lift
  rrf_k: 60                   # Cormack et al. 2009 RRF rank-fusion constant; bigger = flatter
  fusion_oversample: 4        # candidate-pool multiplier for hybrid mode
  rerank_candidates: 40       # max candidates passed to the cross-encoder reranker
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  embedding_model: "BAAI/bge-small-en-v1.5"
  query_instruction: ""       # prepended to the QUERY ONLY at dense-encode time (chunks embed
                              # bare; no re-embed needed). bge-en-v1.5's card recommends
                              # "Represent this sentence for searching relevant passages: "
                              # for short queries; "" disables.
  graph_expansion:              # graph-neighbor expansion of hybrid search (spec 2026-07-10)
    enabled: true               # flipped ON 2026-07-10 after the A/B (4 real queries, rerank on:
                                # zero top-k harm — the cross-encoder gates injected neighbors;
                                # they only matter as a recall net on hard/underfilled queries).
                                # Expansion participates when reranking or when hybrid retrieval
                                # underfills the request. Template adopters: start false, A/B
                                # on your own corpus first.
    seed_hits: 5                # top fused hits whose neighbors are considered
    neighbors_per_hit: 3        # max neighbors injected per seed
    min_edge_score: 3.0         # edge floor for expansion (above the build floor)

ingest:
  http_timeout_seconds: 25    # fetch.py request timeout
  http_user_agent: "Mozilla/5.0 (compatible; WikiVaultBot/1.0; personal research archive)"
  skip_url_handlers:          # URL handlers fetch.py declines to download
    - github
    - huggingface
    - youtube
  drop_query_param_prefixes:  # query-param prefixes dedup_report.py strips during URL canonicalization
    - utm_
    - ref
    - fbclid
    - gclid
    - mc_cid
    - mc_eid

graph:                          # file-relatedness graph (scripts/build/graph.py)
  concept_weight: 1.0           # multiplier for rarity-weighted shared concepts
  tag_weight: 0.5               # multiplier for rarity-weighted shared tags
  wikilink_weight: 3.0          # per distinct wikilink citation between two files
  embedding_weight: 2.0         # multiplier on file-level cosine (only above min_cosine)
  min_cosine: 0.93              # cosine floor for the embedding signal. Tuned empirically
                                # 2026-07-10: same-domain corpora run hot (this corpus: median
                                # pairwise file cosine 0.81, p99 0.935) — 0.93 keeps ~top-1%
                                # most-similar pairs (~5 edges/file). At 0.60 the graph went
                                # complete (445k edges) and communities/insights degenerated.
                                # Re-measure percentiles when adapting to a new corpus.
  min_edge_score: 1.0           # edges below this total are dropped from the artifact
  top_k_neighbors: 10           # neighbors stored per file in graph.json
  louvain_seed: 42              # deterministic community detection
  isolated_max_degree: 0.5      # weighted degree below this => "isolated" insight
  sparse_density: 0.15          # community internal edge density below this => "sparse"
  sparse_min_size: 5            # communities smaller than this are never flagged sparse
  surprising_top_n: 20          # cross-community/category edges reported as "surprising"
