    - PROCESS_NEW_FILE.md
    - PROCESS_HEALTH_CHECK.md
    - PROCESS_QUERY.md
    - PROCESS_DIRECTORY.md
    - README.md
    - log.md
    - llm-wiki.md
    - open_questions.md
    - SYNTHESIS.md

  # Was _DEFAULT_VAULT in locations.py:38. Joined onto Path.home().
  default_relpath:
    - Desktop
    - "AI Safety"
    - "AI Safety"

  # Cowork sandbox mount pattern for this vault (was a literal in
  # locations.py). Derived from the vault folder name, so a different-topic
  # wiki swaps it here along with default_relpath.
  sandbox_mount_glob: "/sessions/*/mnt/AI Safety--AI Safety"

  # Folder holding the maintained concept articles (LLM-written narrative
  # synthesis, one `<slug>__synthesis.md` per concept). Ordinary corpus
  # files — indexed, chunked, mirrored like any category folder.
  concept_articles_relpath: "06_Concept-Articles"
