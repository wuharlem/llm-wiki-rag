# Domain schema for the AI Safety wiki.
# Loaded by scripts/wiki_lib/schema.py::get_schema(). Distinct from config.yml,
# which holds tuning knobs (chunk sizes, BM25 params). This file declares what
# the wiki is *about*: which frontmatter fields exist, what vocab they use,
# which meta docs to skip. To build a different-topic wiki, replace this file.

wiki:
  name: "AI Safety"
  slug: "ai-safety"

# Frontmatter fields in the order they appear as manifest.csv columns
# (after file_id/type/category/subcategory/title/n_chunks/n_tokens/n_pages,
# and before relpath). Order here == manifest column order.
frontmatter:
  fields:
    - {name: tags,          type: tag_list,          vocab_key: tags}
    - {name: concepts,      type: concept_list,      vocab_key: concepts}
    - {name: risk_category, type: categorical_list,  vocab_key: risk_category, label: "Risk categories"}
    - {name: source_type,   type: enum, values: [research_paper, model_card, blog_post, video, book, code, dataset, synthesis, policy, other], pdf_default: research_paper, label: "Type"}
    - {name: author,        type: string}
    - {name: published,     type: date_string}
    - {name: source_url,    type: url, aliases: [source, url], label: "URL"}
    - {name: summary,       type: string, derived: true}

